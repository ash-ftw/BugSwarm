services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bugswarm
      POSTGRES_USER: bugswarm
      POSTGRES_PASSWORD: bugswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugswarm -d bugswarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  buggyshop:
    build:
      context: ./demo/buggyshop
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://bugswarm:bugswarm@postgres:5432/bugswarm
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: http://localhost:5173
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BUGSWARM_DEMO_BASE_URL: http://buggyshop:8090
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./worker
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://bugswarm:bugswarm@postgres:5432/bugswarm
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BUGSWARM_DEMO_BASE_URL: http://buggyshop:8090
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_AUTOSCALE: ${WORKER_AUTOSCALE:-}
      CELERY_LOG_LEVEL: ${CELERY_LOG_LEVEL:-INFO}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
