apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bugswarm-storage
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bugswarm-backend
  labels:
    app: bugswarm-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bugswarm-backend
  template:
    metadata:
      labels:
        app: bugswarm-backend
    spec:
      containers:
        - name: backend
          image: bugswarm-backend:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: bugswarm-config
            - secretRef:
                name: bugswarm-secret
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: bugswarm-storage
---
apiVersion: v1
kind: Service
metadata:
  name: bugswarm-backend
  labels:
    app: bugswarm-backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /api/system/queue/metrics
    prometheus.io/port: "8000"
spec:
  selector:
    app: bugswarm-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
