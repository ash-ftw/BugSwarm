name: BugSwarm CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r worker/requirements.txt
      - name: Compile Python packages
        run: python -m compileall backend/app worker/bugswarm_worker demo/buggyshop
      - name: Run backend tests
        run: python -m unittest discover backend/tests
      - name: Run worker tests
        run: python -m unittest discover worker/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose file
        run: docker compose config
